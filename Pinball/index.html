<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Pinball</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Minimal layout helpers for the game */
    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #fff;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 15px;
      border-radius: 8px;
      font-weight: bold;
      border: 1px solid #444;
      font-size: 1.1rem;
    }

    .container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    #game-canvas {
      max-width: 100%;
      max-height: 100vh;
      width: auto;
      height: auto;
      object-fit: contain;
      background-color: #000;
    }
  </style>
</head>

<body>
  <div class="container">
    <canvas id="game-canvas" width="800" height="1200"></canvas>
    <div class="hud" id="hud">Score: 0 | Balls: 3</div>
  </div>

  <!-- Load the loader; it fetches level.json and then loads game.js -->
  <script src="loader.js"></script>
</body>

</html>

</html>
