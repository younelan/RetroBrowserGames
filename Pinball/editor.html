<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Pinball Level Editor</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="toolbar">
    <h2>Tools</h2>
    <div class="button-grid">
      <button id="wall-tool" class="active">Wall</button>
      <button id="play-mode-toggle">Play</button>
      <button id="delete-tool">Delete</button>
    </div>

    <h2>Elements</h2>
    <div class="button-grid">
      <button id="left-flipper-tool">L.Flipper</button>
      <button id="right-flipper-tool">R.Flipper</button>
      <button id="bumper-tool">Bumper</button>
      <button id="slingshot-tool">Slingshot</button>
      <button id="rollover-tool">Rollover</button>
      <button id="target-tool">Target</button>
      <button id="hole-tool">Hole</button>
      <button id="ramp-tool">Ramp</button>
    </div>

    <h2>Appearance</h2>
    <div class="controls-group">
      <div class="color-picker-item">
        <label for="bg-color">Background</label>
        <input type="color" id="bg-color" value="#000000">
      </div>
      <div class="color-picker-item">
        <label for="wall-color">Wall Color</label>
        <input type="color" id="wall-color" value="#ffffff">
      </div>
      <div class="color-picker-item">
        <label for="bg-image">Background URL</label>
        <input type="text" id="bg-image" placeholder="Image URL...">
      </div>
      <div class="color-picker-item">
        <label for="bg-alpha">Background Alpha</label>
        <input type="range" id="bg-alpha" min="0" max="1" step="0.1" value="1">
      </div>
      <div class="color-picker-item">
        <label for="launch-random">Launch Jitter</label>
        <input type="range" id="launch-random" min="0" max="5" step="1" value="0">
      </div>
    </div>

    <h2>Level Data</h2>
    <textarea id="level-data" rows="10" spellcheck="false" placeholder="JSON data here..."></textarea>
    <div class="data-row">
      <button id="load-button" title="Load JSON">📂 Load</button>
      <button id="save-button" title="Save JSON">💾 Save</button>
    </div>
    <div class="data-row">
      <button id="load-file-button" title="Load level.json">📄 level.json</button>
    </div>
  </div>

  <div class="editor-container">
    <canvas id="editor-canvas" width="800" height="1200"></canvas>
  </div>

  <script src="editor.js"></script>
</body>

</html>
