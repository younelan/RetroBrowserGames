<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- BARRACKS / PRISON CAMP -->
  <g id="barracks" transform="translate(10, 10)">
    <rect x="0" y="30" width="120" height="60" fill="#6b5b4a" /> <!-- Walls -->
    <path d="M 0 30 L 60 0 L 120 30" fill="#4a3e33" /> <!-- Roof -->
    <rect x="50" y="60" width="20" height="30" fill="#222" /> <!-- Door -->
    <rect x="15" y="45" width="20" height="20" fill="#8ab" stroke="#444" /> <!-- Window -->
    <rect x="85" y="45" width="20" height="20" fill="#8ab" stroke="#444" /> <!-- Window -->
  </g>

  <!-- RESCUE POST / HOME BASE -->
  <g id="rescue-post" transform="translate(200, 10)">
    <rect x="0" y="80" width="150" height="10" fill="#333" /> <!-- Platform -->
    <rect x="60" y="20" width="30" height="60" fill="#ccc" /> <!-- Flagpole base -->
    <rect x="72" y="0" width="6" height="80" fill="#888" /> <!-- Pole -->
    <path d="M 78 5 L 120 20 L 78 35 Z" fill="#d33" /> <!-- Red Flag -->
    <text x="65" y="105" font-family="Arial" font-size="14" fill="#666" font-weight="bold">RESCUE ZONE</text>
  </g>

  <!-- ENEMY TANK -->
  <g id="enemy-tank" transform="translate(10, 120)">
    <!-- Tread/Base -->
    <rect x="0" y="30" width="80" height="15" rx="5" fill="#222" />
    <circle cx="10" cy="38" r="5" fill="#111" />
    <circle cx="30" cy="38" r="5" fill="#111" />
    <circle cx="50" cy="38" r="5" fill="#111" />
    <circle cx="70" cy="38" r="5" fill="#111" />
    <!-- Main Body -->
    <path d="M 10 30 L 70 30 L 60 10 L 20 10 Z" fill="#3d4a1b" stroke="#111" />
    <!-- Turret -->
    <circle cx="40" cy="15" r="12" fill="#2d3a16" stroke="#111" />
    <rect x="52" y="12" width="25" height="4" fill="#1a230d" stroke="#111" />
  </g>

  <!-- ANTI-AIR (AA) GUN -->
  <g id="aa-gun" transform="translate(150, 120)">
    <rect x="0" y="40" width="40" height="5" fill="#333" />
    <path d="M 5 40 L 35 40 L 30 20 L 10 20 Z" fill="#2d3a16" stroke="#111" />
    <g transform="translate(20, 25)">
      <rect x="-3" y="-2" width="6" height="10" fill="#222" />
      <g transform="rotate(-45)">
        <rect x="-2" y="-25" width="4" height="25" fill="#1a230d" stroke="#111" />
      </g>
    </g>
  </g>
</svg>
